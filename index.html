<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Deezer Perso</title>
    <!-- On relie le fichier de style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SECTION 1 : SÉLECTION DU PROFIL -->
    <div id="profile-picker">
        <h1>Qui écoute ?</h1>
        <div class="profiles-container">
            <!-- Ton profil principal -->
            <div class="profile-card" onclick="startApp('moi')">
                <img src="https://www.deezer.com/images/user/default_avatar_250x250.png" alt="Moi">
                <p>Mes Favoris</p>
            </div>
            <!-- Un profil découverte (Wildcard) -->
            <div class="profile-card" onclick="startApp('hits')">
                <img src="https://e-cdns-images.dzcdn.net/images/cover/ec914697950c448d6f5195ed8f673f8d/250x250-000000-80-0-0.jpg" alt="Hits">
                <p>Top Hits</p>
            </div>
        </div>
        <div class="auth-notice">
            <a href="https://www.deezer.com/login" target="_self" class="login-btn">Se connecter à Deezer</a>
            <p>Connecte-toi pour débloquer les morceaux entiers.</p>
        </div>
    </div>

    <!-- SECTION 2 : L'APPLICATION -->
    <div id="main-site" style="display: none;">
        <button class="nav-btn" onclick="goBack()">⬅ Retour</button>
        
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Artiste, chanson...">
            <button onclick="searchMusic()">🔍</button>
        </div>

        <h2 id="page-title">Ma Musique</h2>
        <div id="playlist-container"></div>
    </div>

    <!-- On relie le script à la fin -->
    <script src="script.js"></script>
</body>
</html>
