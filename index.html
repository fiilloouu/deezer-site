<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Deezer Perso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ÉCRAN DE SÉLECTION -->
    <div id="profile-picker">
        <h1>Qui écoute ?</h1>
        <div class="profiles-container">
            <!-- Profil 1 : Remplace l'ID par celui de ta playlist "mon site" -->
            <div class="profile-card" onclick="selectProfile('TON_ID_PLAYLIST_MON_SITE', 'Moi')">
                <img src="https://e-cdns-images.dzcdn.net/images/user/250x250-000000-80-0-0.jpg" alt="Avatar">
                <p>Moi</p>
            </div>
            <!-- Profil 2 : Top Hits -->
            <div class="profile-card" onclick="selectProfile('3155776842', 'Hits')">
                <img src="https://e-cdns-images.dzcdn.net/images/cover/ec914697950c448d6f5195ed8f673f8d/250x250-000000-80-0-0.jpg" alt="Avatar">
                <p>Top Hits</p>
            </div>
        </div>
        
        <div id="auth-section">
            <button class="login-btn" onclick="openLogin()">Se connecter à Deezer</button>
            <p id="login-status">Connecte-toi pour débloquer les versions complètes.</p>
        </div>
    </div>

    <!-- LE SITE -->
    <div id="main-site" style="display: none;">
        <button class="back-button" onclick="goBack()">⬅ Changer de profil</button>
        <h1 id="user-welcome">Chargement...</h1>
        <div id="playlist-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
